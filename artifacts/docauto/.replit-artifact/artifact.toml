kind = "web"
previewPath = "/"
title = "DocAuto - Indian Document Platform"
version = "1.0.0"
id = "artifacts/docauto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23415

[services.development]
run = "pnpm --filter @workspace/docauto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docauto", "run", "build" ]
publicDir = "artifacts/docauto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23415"
BASE_PATH = "/"
